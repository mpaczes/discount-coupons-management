spring.application.name=managing-discount-coupons

# konsola H2 Database -> http://localhost:8080/h2-console
spring.datasource.url=jdbc:h2:mem:coupondb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

# MyBatis
# informacja dla MyBatis, gdzie leżą pliki XML
mybatis.mapper-locations=classpath:mappers/*.xml
# mapowanie CamelCase (np. created_at w bazie -> createdAt w Javie)
mybatis.configuration.map-underscore-to-camel-case=true
# aliasy dla modeli (opcjonalnie, pozwala pisać 'Coupon' zamiast pełnej ścieżki w XML)
mybatis.type-aliases-package=pl.paczesny.model

# Swagger
# po uruchomieniu aplikacji interfejs graficzny Swaggera jest tutaj -> http://localhost:8080/swagger-ui/index.html
